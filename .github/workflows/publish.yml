name: Publish

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # Run full CI before publishing
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "ERROR: Tag v$TAG does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          echo "Publishing version $TAG"

      - name: Publish crates
        run: |
          publish() {
            local crate=$1
            echo "Publishing $crate..."
            if OUTPUT=$(cargo publish -p "$crate" 2>&1); then
              echo "$OUTPUT"
              echo "$crate published successfully"
            elif echo "$OUTPUT" | grep -q "already uploaded"; then
              echo "$crate already published, skipping"
            else
              echo "$OUTPUT" >&2
              exit 1
            fi
            sleep 30
          }

          publish pakery-core
          publish pakery-cpace
          publish pakery-opaque
          publish pakery-spake2
          publish pakery-spake2plus
          publish pakery-crypto
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
